<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal Content Implementation & QA System</title>

<style>

/* ===============================
   ROOT THEME VARIABLES
================================ */

:root{
    --primary:#4f46e5;
    --success:#16a34a;
    --warning:#f59e0b;
    --danger:#dc2626;
    --dark:#0f172a;
    --light:#f8fafc;
    --card:#ffffff;
    --border:#e2e8f0;
}

/* ===============================
   GLOBAL STYLES
================================ */

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: "Segoe UI", Roboto, sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    color:var(--dark);
}

header{
    background:linear-gradient(90deg,var(--primary),#6366f1);
    color:white;
    padding:30px 20px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    letter-spacing:0.5px;
}

.container{
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
}

/* ===============================
   GRID LAYOUT
================================ */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }
}

/* ===============================
   CARD DESIGN
================================ */

.card{
    background:var(--card);
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    border:1px solid var(--border);
    margin-bottom:25px;
}

.card h3{
    margin-top:0;
    margin-bottom:15px;
    font-size:16px;
    font-weight:600;
    color:#334155;
}

/* ===============================
   TEXTAREAS
================================ */

textarea{
    width:100%;
    height:230px;
    padding:15px;
    border-radius:12px;
    border:1px solid var(--border);
    font-size:14px;
    resize:vertical;
    transition:0.3s;
}

textarea:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

/* ===============================
   BUTTON
================================ */

.button-wrapper{
    text-align:center;
    margin:30px 0;
}

button{
    padding:14px 35px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:30px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(79,70,229,0.25);
}

/* ===============================
   REPORT STYLES
================================ */

.summary{
    background:#0f172a;
    color:#22c55e;
    padding:20px;
    border-radius:12px;
    white-space:pre-wrap;
    font-family:monospace;
    font-size:14px;
}

.exact{
    color:var(--success);
    font-weight:500;
}

.modified{
    color:var(--warning);
    font-weight:500;
}

.missing{
    color:var(--danger);
    font-weight:500;
}

.score{
    font-weight:bold;
    margin-top:12px;
    color:var(--primary);
}

/* ===============================
   PRINT (A4 READY)
================================ */

@media print{
    body{
        background:white;
    }
    header{
        background:white;
        color:black;
    }
}

</style>
</head>
<body>

<header>
Website Content Implementation & Quality Audit System
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Approved Content (Writer Version)</h3>
<textarea id="input1"></textarea>
</div>

<div class="card">
<h3>Website Content (Developer Version)</h3>
<textarea id="input2"></textarea>
</div>

</div>

<div class="button-wrapper">
<button onclick="runAudit()">Run Full QA Audit</button>
</div>

<div class="card">
<h3>Universal Implementation Report</h3>
<div id="universalReport" class="summary"></div>
</div>

<div class="card">
<div id="sentenceBreakdown"></div>
</div>

<div class="card">
<div id="structureReport"></div>
</div>

<div class="card">
<div id="grammarReport1"></div>
</div>

<div class="card">
<div id="grammarReport2"></div>
</div>

</div>

<script>

/* ===========================
   ALL ORIGINAL JS LOGIC
   (UNCHANGED)
=========================== */

function splitSentences(text){
    return text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];
}

function levenshtein(a,b){
    let matrix=[];
    for(let i=0;i<=b.length;i++){ matrix[i]=[i]; }
    for(let j=0;j<=a.length;j++){ matrix[0][j]=j; }
    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            matrix[i][j]=(b[i-1]==a[j-1]) ?
            matrix[i-1][j-1] :
            Math.min(matrix[i-1][j-1]+1,
                     matrix[i][j-1]+1,
                     matrix[i-1][j]+1);
        }
    }
    return matrix[b.length][a.length];
}

function similarity(a,b){
    if(a.length===0 && b.length===0) return 100;
    let longer=a.length>b.length?a:b;
    let shorter=a.length>b.length?b:a;
    return ((longer.length-levenshtein(longer,shorter))/longer.length)*100;
}

function countRegex(text,regex){
    return (text.match(regex)||[]).length;
}

function grammarCheck(text,target){

    let errors=[];
    let score=100;

    function add(msg,penalty){
        score-=penalty;
        errors.push(msg);
    }

    if(/\bnot\s+never\b/i.test(text))
        add("Double negative detected.",8);

    if(/\breturn back\b/i.test(text))
        add("Redundant phrase detected (return back).",5);

    if(/\bhave\s+\w+\b/i.test(text) && !/\bhave\s+\w+ed\b/i.test(text))
        add("Possible incorrect verb after 'have'.",10);

    if(score<0) score=0;

    let box=document.getElementById(target);
    box.innerHTML="<h3>Grammar Quality Check</h3>";

    if(errors.length===0){
        box.innerHTML+="No major grammar concerns detected.<br>";
    }else{
        errors.forEach(e=>{
            box.innerHTML+="• "+e+"<br>";
        });
    }

    box.innerHTML+="<div class='score'>Grammar Score: "+score+"/100</div>";
}

function runAudit(){

    let writer=document.getElementById("input1").value.trim();
    let website=document.getElementById("input2").value.trim();

    let writerSent=splitSentences(writer);
    let webSent=splitSentences(website);

    let exact=0,modified=0,missing=0;
    let breakdownHTML="<h3>Sentence Comparison Breakdown</h3>";

    writerSent.forEach((sentence,index)=>{

        let foundExact=webSent.find(s=>s.trim()===sentence.trim());

        if(foundExact){
            exact++;
            breakdownHTML+=`<div class="exact">Sentence ${index+1}: EXACT MATCH</div>`;
        }else{

            let best=0;
            webSent.forEach(ws=>{
                let sim=similarity(sentence,ws);
                if(sim>best) best=sim;
            });

            if(best>65){
                modified++;
                breakdownHTML+=`<div class="modified">Sentence ${index+1}: MODIFIED (${best.toFixed(1)}% similar)</div>`;
            }else{
                missing++;
                breakdownHTML+=`<div class="missing">Sentence ${index+1}: MISSING</div>`;
            }
        }
    });

    let completion=((exact*1)+(modified*0.6))/writerSent.length*100;
    let overallSimilarity=similarity(writer,website);

    let scripts=countRegex(website,/<script[\s\S]*?>[\s\S]*?<\/script>/gi);
    let urls=countRegex(website,/https?:\/\/[^\s]+|www\.[^\s]+/gi);
    let emails=countRegex(website,/\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/i);
    let numbers=countRegex(website,/\b\d+(\.\d+)?%?\b/g);
    let lists=countRegex(website,/^\s*[-*•]\s+/gm)+countRegex(website,/^\s*\d+\.\s+/gm);
    let htmlTags=countRegex(website,/<\/?[a-z][\s\S]*?>/gi);

    document.getElementById("universalReport").textContent=
`CONTENT IMPLEMENTATION REPORT
--------------------------------

Content Completion Level: ${completion.toFixed(2)}%

What Was Implemented Correctly:
- ${exact} sentences copied exactly as approved.

What Was Modified:
- ${modified} sentences slightly changed.

What Is Missing:
- ${missing} sentences not found in website version.

Overall Content Similarity: ${overallSimilarity.toFixed(2)}%

Conclusion:
${completion>95 ? 
"Developer has successfully implemented almost all approved content." :
completion>75 ?
"Most content is implemented but review recommended." :
"Significant differences detected. Manual review required."
}
`;

    document.getElementById("sentenceBreakdown").innerHTML=breakdownHTML;

    document.getElementById("structureReport").innerHTML=
`<h3>Website Structural & Technical Elements</h3>
Script Tags: ${scripts}<br>
URLs: ${urls}<br>
Emails: ${emails}<br>
Numbers / Statistics: ${numbers}<br>
List Items: ${lists}<br>
HTML Tags: ${htmlTags}
`;

    grammarCheck(writer,"grammarReport1");
    grammarCheck(website,"grammarReport2");
}

</script>

</body>
</html>
